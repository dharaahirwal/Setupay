services:
  # Backend API Service
  - type: web
    name: setupay-backend
    runtime: node
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: setupay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
    healthCheckPath: /health

databases:
  # PostgreSQL Database
  - name: setupay-db
    databaseName: setupay
    user: setupay_user
    region: oregon
    plan: free
