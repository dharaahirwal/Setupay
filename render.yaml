services:
  # Backend API Service
  - type: web
    name: setupay-backend
    runtime: node
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
    healthCheckPath: /health

databases:
  # MongoDB Database (optional - you can use MongoDB Atlas instead)
  # Render doesn't provide MongoDB, so you'll need to use MongoDB Atlas
  # Instructions below in the deployment guide
